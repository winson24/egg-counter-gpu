name: Build with GPU Spec

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install PyTorch with CUDA
      run: |
        pip install torch==2.0.1+cu118 torchvision==0.15.2+cu118 --index-url https://download.pytorch.org/whl/cu118
      shell: pwsh
    
    - name: Install other dependencies
      run: |
        pip install ultralytics opencv-python pyModbusTCP harvesters openpyxl numpy pillow
        pip install pyinstaller
      shell: pwsh
    
    - name: List directory contents
      run: |
        echo "Current directory:"
        Get-Location
        echo "Files:"
        Get-ChildItem
      shell: pwsh
    
    - name: Build with spec file
      run: |
        # Make sure your spec file is named correctly
        pyinstaller egg_counter.spec
      shell: pwsh
    
    - name: List dist contents
      run: |
        echo "Contents of dist folder:"
        if (Test-Path dist) {
          Get-ChildItem -Path dist -Recurse
        } else {
          echo "dist folder not found"
        }
      shell: pwsh
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: DAC_Egg_Counter_GPU
        path: dist/DAC_Egg_Counter_GPU.exe
        if-no-files-found: warn

name: Debug Build - Find EXE

on:
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install torch==2.0.1+cu118 torchvision==0.15.2+cu118 --index-url https://download.pytorch.org/whl/cu118
        pip install ultralytics opencv-python pyModbusTCP harvesters openpyxl numpy pillow
        pip install pyinstaller
      shell: pwsh
    
    - name: List all files before build
      run: |
        echo "=== Files in repository ==="
        Get-ChildItem -Path . -Recurse
      shell: pwsh
    
    - name: Build with spec file
      run: |
        echo "=== Building with spec file ==="
        pyinstaller egg_counter.spec
      shell: pwsh
    
    - name: Search for ALL generated files
      run: |
        echo "=== Searching for all EXE files ==="
        Get-ChildItem -Path . -Recurse -Filter *.exe | ForEach-Object {
          echo "Found EXE: $($_.FullName)"
        }
        
        echo "=== Contents of dist folder ==="
        if (Test-Path dist) {
          Get-ChildItem -Path dist -Recurse
        } else {
          echo "dist folder not found"
        }
        
        echo "=== Contents of build folder ==="
        if (Test-Path build) {
          Get-ChildItem -Path build -Recurse
        } else {
          echo "build folder not found"
        }
        
        echo "=== Contents of current directory ==="
        Get-ChildItem -Path .
      shell: pwsh
    
    - name: Upload everything as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debug-output
        path: |
          dist/
          build/
          *.exe
          *.spec
        retention-days: 7

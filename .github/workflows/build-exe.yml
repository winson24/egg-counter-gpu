name: Build GPU-Capable EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install CUDA PyTorch
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118

    - name: Install requirements
      run: |
        pip install opencv-python ultralytics pyModbusTCP harvesters openpyxl pillow numpy
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed `
          --hidden-import torch `
          --hidden-import torch.cuda `
          --hidden-import torch.backends.cuda `
          --hidden-import torch.backends.cudnn `
          --hidden-import ultralytics `
          --hidden-import cv2 `
          --hidden-import PIL `
          --hidden-import pyModbusTCP `
          --hidden-import harvesters `
          --hidden-import openpyxl `
          --name "DAC_Egg_Counter_GPU" `
          egg_counter.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: DAC_Egg_Counter_GPU
        path: dist/DAC_Egg_Counter_GPU.exe

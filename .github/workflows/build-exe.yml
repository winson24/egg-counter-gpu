name: Build GPU Egg Counter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install PyTorch with CUDA
      run: |
        pip install torch==2.0.1+cu118 torchvision==0.15.2+cu118 --index-url https://download.pytorch.org/whl/cu118
      shell: pwsh
    
    - name: Install other dependencies
      run: |
        pip install ultralytics opencv-python pyModbusTCP harvesters openpyxl numpy pillow
        pip install pyinstaller
      shell: pwsh
    
    - name: Build with spec file
      run: |
        pyinstaller egg_counter.spec
      shell: pwsh
    
    - name: Check what was built
      run: |
        echo "=== Checking dist folder ==="
        if (Test-Path dist) {
          Get-ChildItem -Path dist
          
          # Try to find any EXE file
          $exeFiles = Get-ChildItem -Path dist -Filter *.exe -Recurse
          if ($exeFiles.Count -gt 0) {
            echo "Found EXE files:"
            $exeFiles | ForEach-Object {
              echo "  $($_.Name) at $($_.FullName)"
              # Copy to a known location
              Copy-Item $_.FullName -Destination "EggCounter.exe"
            }
          } else {
            echo "No EXE files found in dist"
          }
        } else {
          echo "dist folder not found"
        }
      shell: pwsh
    
    - name: Upload EXE (try multiple possible names)
      uses: actions/upload-artifact@v4
      with:
        name: EggCounter_GPU
        path: |
          dist/DAC_Egg_Counter.exe
          dist/DAC_Egg_Counter_GPU.exe
          dist/EggCounter.exe
          EggCounter.exe
          *.exe
        if-no-files-found: warn

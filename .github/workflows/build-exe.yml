name: Build Egg Counter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Verify files
      run: |
        echo "Current directory:"
        pwd
        echo "Files in repository:"
        dir
        if (Test-Path "egg_counter.py") {
          echo "✅ Found egg_counter.py"
        } else {
          echo "❌ egg_counter.py NOT FOUND!"
          exit 1
        }
      shell: pwsh
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cu118
        pip install ultralytics opencv-python pyModbusTCP harvesters openpyxl numpy pillow
        pip install pyinstaller
      shell: pwsh
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --name "EggCounter_GPU" egg_counter.py
        echo "Build completed. Checking output..."
        if (Test-Path "dist/EggCounter_GPU.exe") {
          echo "✅ EXE created successfully!"
          dir dist
        } else {
          echo "❌ EXE not found!"
          echo "Contents of dist folder:"
          if (Test-Path "dist") { dir dist } else { echo "dist folder not found" }
        }
      shell: pwsh
    
    - name: Upload EXE
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: EggCounter_GPU
        path: dist/EggCounter_GPU.exe
        if-no-files-found: error
